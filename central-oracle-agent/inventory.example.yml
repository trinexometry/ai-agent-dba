databases:
  local_free:
    database_name: FREEPDB1
    hostname: localhost
    dsn: localhost:1521/FREEPDB1
    username_env: ORACLE_LOCAL_USER
    password_env: ORACLE_LOCAL_PASSWORD
    mode: null
    environment: dev
    require_start_confirmation: true
    require_mutation_approval: true
    require_typed_scope_confirmation: false
    diagnostics_pack_enabled: false
    tuning_pack_enabled: false
    runbook_dir: ./runbooks
    ollama_url: http://localhost:11434
    ollama_model: llama3.1:8b

  prod1:
    database_name: PROD
    hostname: prod-db01.example.internal
    dsn: prod-db01.example.internal:1521/PROD
    username_env: ORACLE_PROD1_USER
    password_env: ORACLE_PROD1_PASSWORD
    mode: null
    environment: prod
    require_start_confirmation: true
    require_mutation_approval: true
    require_typed_scope_confirmation: true
    diagnostics_pack_enabled: true
    tuning_pack_enabled: true
    runbook_dir: ./runbooks
    ollama_url: http://localhost:11434
    ollama_model: llama3.1:8b
